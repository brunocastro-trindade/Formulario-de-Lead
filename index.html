<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Leads</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <form id="leadForm" novalidate>
        <div class="field-wrap" id="wrap-nome">
            <label for="nome">Nome completo</label>

            <input
            type="text"
            id="nome"
            name="nome"
            placeholder="Seu nome"
            autocomplete="name"
            />

            <div class="error-msg" id="erro-nome">
                Por favor, insira seu nome completo.
            </div>

            <div class="field-wrap" id="wrap-email">
                <label for="email">E-mail</label>

                <input
                type="email"
                id="email"
                name="email"
                placeholder="voce@email.com"
                autocomplete="email"
                />

                <div class="error-msg" id="erro-email">
                    Por favor, insira um e-mail válido.
                </div>

                <div class="field-wrap" id="wrap-tel">
                    <label for="tel">WhatsApp</label>
                <input
                    type="tel"
                    id="tel"
                    name="tel"
                    placeholder="(47) 99999-9999"
                />

                <div class="error-msg" id="erro-tel">
                    Por favor, insira um número de WhatsApp válido.
                </div>

                <button type="submit" id="btn-submit">
                    Quero meu diagnóstico grátis
                </button>
    </form>
    
</body>
</html>
